apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: support-priority-app-prod
  namespace: argocd
spec:
  project: support-priority-project
  source:
    repoURL: #<URL_DE_VOTRE_FORK>
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: support-priority
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
